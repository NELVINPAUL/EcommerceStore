
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>AquaVibe — Swimwear & Sports</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800;900&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#0ea5e9;--blue2:#0284c7;--blue3:#0c4a6e;
  --red:#ef4444;--green:#10b981;--amber:#f59e0b;--purple:#8b5cf6;
  --gray50:#f8fafc;--gray100:#f3f4f6;--gray200:#e5e7eb;--gray300:#d1d5db;
  --gray400:#9ca3af;--gray600:#6b7280;--gray700:#374151;--gray900:#111827;
  --dark:#0a1628;
}
body{font-family:'DM Sans',sans-serif;background:var(--gray50);color:var(--gray900);margin:0}
h1,h2,h3,h4,.logo-text{font-family:'Sora',sans-serif}
button{font-family:'DM Sans',sans-serif;cursor:pointer}
input,select,textarea{font-family:'DM Sans',sans-serif}
a{text-decoration:none;color:inherit}
img{display:block;max-width:100%}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:#f1f5f9}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}

@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

.page{display:none}
.page.active{display:block}

/* ─── TOPBAR ─── */
.topbar{background:linear-gradient(135deg,#0c4a6e,#0284c7);color:#fff;text-align:center;padding:9px 0;font-size:13px;font-weight:500;letter-spacing:.3px}
.topbar strong{font-weight:800;color:#7dd3fc}

/* ─── HEADER ─── */
.header{background:#fff;border-bottom:1px solid var(--gray100);position:sticky;top:0;z-index:500;box-shadow:0 1px 24px rgba(0,0,0,.07)}
.header-inner{max-width:1400px;margin:0 auto;padding:12px 28px;display:flex;align-items:center;gap:20px}
.logo{display:flex;align-items:center;gap:12px;cursor:pointer;min-width:fit-content}
.logo-icon{background:linear-gradient(135deg,#0ea5e9,#0c4a6e);color:#fff;width:42px;height:42px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 4px 12px rgba(14,165,233,.4)}
.logo-text{font-weight:900;font-size:21px;background:linear-gradient(135deg,#0ea5e9,#0c4a6e);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-.5px}
.logo-sub{font-size:9px;color:var(--gray400);letter-spacing:2px;text-transform:uppercase;margin-top:-2px}
.search-wrap{flex:1;position:relative;max-width:520px}
.search-wrap input{width:100%;padding:11px 18px 11px 46px;border-radius:14px;border:2px solid var(--gray200);font-size:14px;outline:none;background:var(--gray50);transition:all .2s;color:var(--gray900)}
.search-wrap input:focus{border-color:var(--blue);background:#fff;box-shadow:0 0 0 4px rgba(14,165,233,.1)}
.search-wrap input::placeholder{color:var(--gray400)}
.search-icon{position:absolute;left:15px;top:50%;transform:translateY(-50%);font-size:17px;color:var(--gray400)}
.nav-icons{display:flex;align-items:center;gap:6px}
.icon-btn{background:none;border:none;display:flex;flex-direction:column;align-items:center;color:var(--gray600);position:relative;padding:8px 10px;border-radius:10px;transition:all .2s;gap:2px}
.icon-btn:hover{background:var(--gray100);color:var(--blue)}
.icon-btn .emoji{font-size:22px}
.icon-btn .lbl{font-size:10px;font-weight:600}
.badge{position:absolute;top:2px;right:2px;border-radius:50%;width:18px;height:18px;font-size:10px;display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;border:2px solid #fff}
.badge-blue{background:var(--blue)}
.badge-red{background:var(--red)}
.user-btn{display:flex;align-items:center;gap:10px;background:linear-gradient(135deg,#f0f9ff,#e0f2fe);border:1.5px solid #bae6fd;border-radius:12px;padding:8px 16px;cursor:pointer;transition:all .2s}
.user-btn:hover{background:linear-gradient(135deg,#e0f2fe,#bae6fd);border-color:#7dd3fc}
.user-avatar{width:30px;height:30px;background:linear-gradient(135deg,var(--blue),var(--blue3));border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:14px}
.user-name{font-size:14px;font-weight:700;color:var(--blue3)}
.dropdown{position:absolute;right:0;top:52px;background:#fff;border-radius:14px;box-shadow:0 16px 48px rgba(0,0,0,.14);border:1px solid var(--gray100);min-width:200px;overflow:hidden;z-index:600;animation:slideUp .2s ease}
.dropdown-item{width:100%;padding:13px 18px;border:none;background:none;text-align:left;cursor:pointer;display:flex;align-items:center;gap:10px;font-size:14px;color:var(--gray700);transition:background .15s;font-weight:500}
.dropdown-item:hover{background:#f0f9ff;color:var(--blue)}
.dropdown-item.danger{color:var(--red)}
.dropdown-item.danger:hover{background:#fef2f2}
.dropdown hr{margin:4px 0;border:none;border-top:1px solid var(--gray100)}
.user-wrap{position:relative}

/* ─── CATEGORY NAV ─── */
.cat-nav{border-top:1px solid var(--gray100);overflow-x:auto;background:#fff}
.cat-nav::-webkit-scrollbar{display:none}
.cat-nav-inner{max-width:1400px;margin:0 auto;padding:0 28px;display:flex}
.cat-btn{padding:11px 18px;border:none;background:none;cursor:pointer;font-weight:600;font-size:13px;color:var(--gray600);white-space:nowrap;display:flex;align-items:center;gap:7px;border-bottom:3px solid transparent;transition:all .2s;font-family:'DM Sans',sans-serif}
.cat-btn:hover{color:var(--blue);background:#f0f9ff}
.cat-btn.active{color:var(--blue);border-bottom-color:var(--blue);background:#f0f9ff}

/* ─── TOAST ─── */
.toasts{position:fixed;bottom:28px;right:28px;display:flex;flex-direction:column;gap:10px;z-index:9999}
.toast{padding:14px 20px;border-radius:14px;color:#fff;font-weight:600;font-size:14px;display:flex;align-items:center;gap:12px;box-shadow:0 8px 32px rgba(0,0,0,.2);animation:slideUp .3s ease;min-width:280px}
.toast-success{background:linear-gradient(135deg,#059669,#10b981)}
.toast-error{background:linear-gradient(135deg,#dc2626,#ef4444)}
.toast-info{background:linear-gradient(135deg,#0284c7,#0ea5e9)}
.toast-close{background:none;border:none;color:rgba(255,255,255,.8);font-size:20px;cursor:pointer;margin-left:auto;line-height:1;padding:0 2px}
.toast-close:hover{color:#fff}

/* ─── PRODUCT CARD ─── */
.product-card{background:#fff;border-radius:18px;overflow:hidden;box-shadow:0 2px 16px rgba(0,0,0,.07);transition:all .3s ease;cursor:pointer;position:relative}
.product-card:hover{transform:translateY(-6px);box-shadow:0 20px 48px rgba(0,0,0,.14)}
.product-img-wrap{position:relative;overflow:hidden;background:#f1f5f9}
.product-img{width:100%;height:280px;object-fit:cover;transition:transform .5s ease;display:block}
.product-card:hover .product-img{transform:scale(1.07)}
.product-badge{position:absolute;top:14px;left:14px;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:800;letter-spacing:1px;color:#fff;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.badge-new{background:linear-gradient(135deg,#0ea5e9,#0284c7)}
.badge-sale{background:linear-gradient(135deg,#ef4444,#dc2626)}
.badge-best{background:linear-gradient(135deg,#f59e0b,#d97706)}
.wish-btn{position:absolute;top:14px;right:14px;background:rgba(255,255,255,.95);border:none;border-radius:50%;width:38px;height:38px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .25s;box-shadow:0 2px 8px rgba(0,0,0,.12)}
.wish-btn:hover{transform:scale(1.1)}
.wish-btn.active{background:#fef2f2}
.product-body{padding:16px 18px}
.product-cat{font-size:11px;color:var(--blue);margin-bottom:5px;text-transform:uppercase;letter-spacing:1px;font-weight:700}
.product-name{margin-bottom:8px;font-size:15px;font-weight:700;color:var(--gray900);line-height:1.3}
.star-row{display:flex;align-items:center;gap:3px}
.star{font-size:13px}
.star-count{font-size:12px;color:var(--gray600);margin-left:2px}
.price-row{display:flex;align-items:center;gap:10px;margin-top:10px}
.price-main{font-size:19px;font-weight:800;font-family:'Sora',sans-serif}
.price-orig{font-size:13px;color:var(--gray400);text-decoration:line-through}
.color-dots{display:flex;gap:5px;margin-top:10px;align-items:center}
.color-dot{width:16px;height:16px;border-radius:50%;border:2px solid rgba(0,0,0,.1);flex-shrink:0}
.more-colors{font-size:11px;color:var(--gray400);margin-left:2px}
.add-cart-btn{width:100%;margin-top:14px;padding:11px;background:linear-gradient(135deg,var(--blue),var(--blue2));color:#fff;border:none;border-radius:12px;font-weight:700;font-size:14px;cursor:pointer;transition:all .2s;letter-spacing:.3px}
.add-cart-btn:hover{opacity:.88;transform:translateY(-1px)}

/* ─── PRODUCT GRID ─── */
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:22px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:22px}
.grid-6{display:grid;grid-template-columns:repeat(6,1fr);gap:16px}

/* ─── SECTION ─── */
.section{margin-bottom:60px}
.section-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px}
.section-title{font-size:30px;font-weight:900;color:var(--gray900);margin:0;letter-spacing:-.5px}
.view-all-btn{color:var(--blue);background:none;border:2px solid var(--blue);border-radius:10px;padding:8px 20px;cursor:pointer;font-weight:700;font-size:14px;font-family:'DM Sans',sans-serif;transition:all .2s}
.view-all-btn:hover{background:var(--blue);color:#fff}
.view-all-btn.red{color:var(--red);border-color:var(--red)}
.view-all-btn.red:hover{background:var(--red);color:#fff}

/* ─── HERO ─── */
.hero{position:relative;height:560px;overflow:hidden}
.hero-img{width:100%;height:100%;object-fit:cover;display:block;object-position:center 30%}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(to right,rgba(5,30,60,.82) 0%,rgba(5,30,60,.5) 55%,transparent 100%)}
.hero-content{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;padding:0 100px;animation:slideUp .6s ease}
.hero-tag{background:rgba(14,165,233,.25);border:1px solid rgba(14,165,233,.5);color:#7dd3fc;padding:6px 16px;border-radius:20px;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;display:inline-block;width:fit-content;margin-bottom:20px}
.hero-title{color:#fff;font-size:62px;font-weight:900;margin:0 0 18px;line-height:1.05;letter-spacing:-1.5px;text-shadow:0 2px 30px rgba(0,0,0,.3)}
.hero-title span{color:#7dd3fc}
.hero-sub{color:rgba(255,255,255,.85);font-size:18px;margin:0 0 36px;max-width:460px;line-height:1.6}
.hero-btns{display:flex;gap:14px}
.hero-btn-primary{padding:15px 36px;background:linear-gradient(135deg,#0ea5e9,#0284c7);color:#fff;border:none;border-radius:14px;font-weight:800;font-size:16px;cursor:pointer;font-family:'Sora',sans-serif;box-shadow:0 8px 24px rgba(14,165,233,.5);transition:all .2s;letter-spacing:.3px}
.hero-btn-primary:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(14,165,233,.6)}
.hero-btn-ghost{padding:15px 36px;background:rgba(255,255,255,.12);color:#fff;border:2px solid rgba(255,255,255,.45);border-radius:14px;font-weight:700;font-size:16px;cursor:pointer;backdrop-filter:blur(12px);font-family:'Sora',sans-serif;transition:all .2s;letter-spacing:.3px}
.hero-btn-ghost:hover{background:rgba(255,255,255,.22)}

/* ─── USP BAR ─── */
.usp-bar{background:linear-gradient(135deg,#f0f9ff,#e0f2fe);border-bottom:1px solid #bae6fd}
.usp-inner{max-width:1400px;margin:0 auto;padding:22px 28px;display:grid;grid-template-columns:repeat(4,1fr)}
.usp-item{display:flex;align-items:center;gap:14px;padding:8px 24px;border-right:1px solid rgba(14,165,233,.2)}
.usp-item:last-child{border-right:none}
.usp-icon{font-size:30px}
.usp-title{font-weight:800;font-size:14px;color:#0c4a6e}
.usp-sub{font-size:12px;color:#0369a1;margin-top:2px}

/* ─── CATEGORY GRID ─── */
.cat-grid-item{cursor:pointer;border-radius:18px;overflow:hidden;position:relative;aspect-ratio:1;box-shadow:0 4px 20px rgba(0,0,0,.1);transition:all .35s}
.cat-grid-item:hover{box-shadow:0 12px 36px rgba(0,0,0,.2);transform:translateY(-4px)}
.cat-grid-item img{width:100%;height:100%;object-fit:cover;transition:transform .5s ease;display:block}
.cat-grid-item:hover img{transform:scale(1.1)}
.cat-grid-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.7) 0%,rgba(0,0,0,.1) 60%,transparent 100%)}
.cat-grid-label{position:absolute;bottom:14px;left:0;right:0;color:#fff;font-weight:800;font-size:13px;text-align:center;padding:0 8px;line-height:1.2;text-shadow:0 1px 4px rgba(0,0,0,.5);font-family:'Sora',sans-serif}

/* ─── PROMO BANNER ─── */
.promo-banner{border-radius:24px;overflow:hidden;position:relative;margin-bottom:60px;height:280px}
.promo-banner img{width:100%;height:100%;object-fit:cover;display:block;object-position:center 40%}
.promo-overlay{position:absolute;inset:0;background:linear-gradient(135deg,rgba(12,74,110,.88),rgba(2,132,199,.6));display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px}
.promo-tag{color:#7dd3fc;font-size:13px;font-weight:800;letter-spacing:3px;text-transform:uppercase}
.promo-title{color:#fff;font-size:46px;font-weight:900;margin:0;text-align:center;letter-spacing:-.5px}
.promo-btn{padding:15px 40px;background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff;border:none;border-radius:14px;font-weight:800;font-size:16px;cursor:pointer;font-family:'Sora',sans-serif;box-shadow:0 8px 24px rgba(239,68,68,.4);transition:all .2s;letter-spacing:.3px}
.promo-btn:hover{transform:translateY(-2px)}

/* ─── IG GRID ─── */
.ig-grid-item{border-radius:14px;overflow:hidden;aspect-ratio:1;cursor:pointer;position:relative}
.ig-grid-item img{width:100%;height:100%;object-fit:cover;transition:transform .4s;display:block}
.ig-grid-item:hover img{transform:scale(1.1)}
.ig-grid-item .ig-overlay{position:absolute;inset:0;background:rgba(14,165,233,.0);transition:background .3s;display:flex;align-items:center;justify-content:center;color:#fff;font-size:24px;opacity:0}
.ig-grid-item:hover .ig-overlay{background:rgba(14,165,233,.45);opacity:1}

/* ─── FOOTER ─── */
footer{background:var(--dark);color:#64748b;padding:56px 28px 28px}
.footer-inner{max-width:1400px;margin:0 auto;display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:48px;padding-bottom:40px;border-bottom:1px solid rgba(255,255,255,.08)}
.footer-brand-wrap{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.footer-brand-icon{background:linear-gradient(135deg,var(--blue),var(--blue3));color:#fff;width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px}
.footer-brand-name{color:#fff;font-weight:900;font-size:21px;font-family:'Sora',sans-serif}
.footer-text{line-height:1.8;font-size:14px;color:#94a3b8;max-width:300px}
.footer-socials{display:flex;gap:10px;margin-top:20px}
.footer-social-btn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:#94a3b8;padding:9px 16px;border-radius:10px;cursor:pointer;font-size:12px;font-weight:600;transition:all .2s}
.footer-social-btn:hover{background:rgba(14,165,233,.2);border-color:rgba(14,165,233,.4);color:#7dd3fc}
.footer-col h4{color:#e2e8f0;margin-bottom:18px;font-size:15px;font-family:'Sora',sans-serif;font-weight:700}
.footer-link{display:block;margin:10px 0;font-size:14px;cursor:pointer;transition:color .2s;color:#64748b}
.footer-link:hover{color:#7dd3fc}
.footer-bottom{max-width:1400px;margin:0 auto;padding-top:28px;display:flex;justify-content:space-between;align-items:center;font-size:13px;color:#64748b}
.pay-pill{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);padding:5px 12px;border-radius:8px;font-size:12px}

/* ─── SHOP PAGE ─── */
.shop-layout{max-width:1400px;margin:0 auto;padding:36px 28px;display:grid;grid-template-columns:260px 1fr;gap:32px}
.sidebar{background:#fff;border-radius:18px;padding:24px;box-shadow:0 2px 16px rgba(0,0,0,.06);position:sticky;top:152px;height:fit-content;border:1px solid var(--gray100)}
.sidebar h3{margin:0 0 22px;font-size:17px;font-weight:800;color:var(--gray900)}
.filter-section{margin-bottom:24px;padding-bottom:24px;border-bottom:1px solid var(--gray100)}
.filter-section:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.filter-label{font-weight:700;font-size:12px;color:var(--gray400);margin-bottom:10px;text-transform:uppercase;letter-spacing:1px}
.filter-btn{display:block;width:100%;text-align:left;padding:8px 12px;border:none;border-radius:10px;background:none;color:var(--gray700);cursor:pointer;font-size:13px;margin-bottom:4px;font-family:'DM Sans',sans-serif;transition:all .2s;font-weight:500}
.filter-btn:hover{background:#f0f9ff;color:var(--blue)}
.filter-btn.active{background:#eff6ff;color:var(--blue);font-weight:700}
.price-inputs{display:flex;gap:10px}
.price-inp{width:50%;padding:8px 12px;border:2px solid var(--gray200);border-radius:10px;font-size:13px;font-family:'DM Sans',sans-serif;transition:border-color .2s}
.price-inp:focus{outline:none;border-color:var(--blue)}
.clear-btn{width:100%;padding:10px;background:var(--gray100);border:none;border-radius:10px;cursor:pointer;font-size:13px;color:var(--gray700);font-weight:700;margin-top:4px;font-family:'DM Sans',sans-serif;transition:all .2s}
.clear-btn:hover{background:var(--gray200)}
.shop-sort-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:26px}
.sort-select{padding:9px 16px;border-radius:12px;border:2px solid var(--gray200);font-size:14px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;color:var(--gray700);background:#fff;transition:border-color .2s}
.sort-select:focus{outline:none;border-color:var(--blue)}
.empty-state{text-align:center;padding:100px 0;color:var(--gray400)}
.empty-icon{font-size:70px}
.empty-title{font-size:20px;font-weight:700;margin-top:18px;color:var(--gray600)}

/* ─── MODAL ─── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:1000;display:flex;align-items:center;justify-content:center;padding:24px;animation:fadeIn .2s ease;backdrop-filter:blur(4px)}
.modal-box{background:#fff;border-radius:24px;max-width:900px;width:100%;max-height:90vh;overflow:auto;display:grid;grid-template-columns:1fr 1fr}
.modal-img-side{position:relative;background:#f1f5f9}
.modal-img{width:100%;height:100%;object-fit:cover;border-radius:24px 0 0 24px;display:block;min-height:480px}
.modal-badge-wrap{position:absolute;top:18px;left:18px;display:flex;gap:8px}
.modal-badge{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:800;color:#fff;letter-spacing:.5px}
.modal-body{padding:36px;overflow-y:auto;display:flex;flex-direction:column;gap:0}
.modal-close{float:right;background:var(--gray100);border:none;border-radius:50%;width:36px;height:36px;cursor:pointer;font-size:20px;line-height:36px;text-align:center;transition:all .2s;color:var(--gray600)}
.modal-close:hover{background:var(--gray200);color:var(--gray900)}
.modal-cat{color:var(--blue);text-transform:uppercase;font-size:11px;letter-spacing:1.5px;margin:12px 0 8px;font-weight:800}
.modal-title{margin:0 0 10px;font-size:24px;font-weight:800;color:var(--gray900);letter-spacing:-.3px;line-height:1.2}
.modal-price-row{display:flex;align-items:center;gap:12px;margin:16px 0}
.modal-price{font-size:30px;font-weight:900;font-family:'Sora',sans-serif}
.modal-orig{color:var(--gray400);text-decoration:line-through;font-size:18px}
.discount-tag{background:#fef2f2;color:var(--red);padding:5px 12px;border-radius:20px;font-size:13px;font-weight:800}
.option-label{font-weight:700;font-size:13px;color:var(--gray700);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px}
.option-label span{font-weight:400;color:var(--blue);text-transform:none;letter-spacing:0}
.option-pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.option-pill{padding:7px 16px;border-radius:20px;border:2px solid var(--gray200);background:#fff;cursor:pointer;font-size:13px;transition:all .2s;font-family:'DM Sans',sans-serif;font-weight:500}
.option-pill:hover{border-color:var(--blue);color:var(--blue)}
.option-pill.active{border-color:var(--blue);background:#eff6ff;color:var(--blue);font-weight:700}

.cancel-form-btn{padding:12px 24px;background:var(--gray100);border:none;border-radius:12px;cursor:pointer;font-size:14px;color:var(--gray700);font-weight:700;font-family:'DM Sans',sans-serif;transition:background .2s}

function addToast(msg,type="info"){
  const el=document.createElement("div");
  el.className=`toast toast-${type}`;
  el.innerHTML=`<span>${msg}</span><button class="toast-close" onclick="this.parentElement.remove()">×</button>`;
  document.getElementById("toastsContainer").appendChild(el);
  setTimeout(()=>el.remove?.(),3500);
}
function addToCart(productId,size,color,qty=1){
  const p=state.products.find(x=>x.id===productId);
  if(!p)return;
  const idx=state.cart.findIndex(i=>i.id===productId&&i.size===size&&i.color===color);
  if(idx>-1)state.cart[idx].qty+=qty;
  else state.cart.push({...p,size,color,qty});
  updateBadges();
  addToast(`${p.name} added to cart 🛒`,"success");
}
function removeFromCart(productId,size,color){
  state.cart=state.cart.filter(i=>!(i.id===productId&&i.size===size&&i.color===color));
  updateBadges();
  if(state.page==="cart")renderCart();
}
function changeQty(productId,size,color,delta){
  const idx=state.cart.findIndex(i=>i.id===productId&&i.size===size&&i.color===color);
  if(idx<0)return;
  state.cart[idx].qty=Math.max(1,state.cart[idx].qty+delta);
  updateBadges();
  if(state.page==="cart")renderCart();
}
function toggleWishlist(productId){
  const p=state.products.find(x=>x.id===productId);
  if(!p)return;
  const idx=state.wishlist.findIndex(w=>w.id===productId);
  if(idx>-1){state.wishlist.splice(idx,1);addToast("Removed from wishlist","info");}
  else{state.wishlist.push(p);addToast("Added to wishlist ❤️","success");}
  updateBadges();
  if(state.page==="wishlist")renderWishlist();
  document.querySelectorAll(`[data-wish="${productId}"]`).forEach(btn=>{
    const inW=state.wishlist.some(w=>w.id===productId);
    btn.textContent=inW?"❤️":"🤍";
    btn.classList.toggle("active",inW);
  });
}
function updateBadges(){
  const cc=cartCount();
  const cb=document.getElementById("cartBadge");
  if(cb){cb.style.display=cc>0?"flex":"none";cb.textContent=cc;}
  const wl=state.wishlist.length;
  const wb=document.getElementById("wishBadge");
  if(wb){wb.style.display=wl>0?"flex":"none";wb.textContent=wl;}
}
function navigate(page,cat=null){
  if(["checkout","account","orders"].includes(page)&&!state.user){state.pendingPage=page;navigate("login");return;}
  if(page==="admin"&&state.user?.role!=="admin"){addToast("Admin access required","error");return;}
  if(cat!==null)state.activeCategory=cat;
  state.page=page;
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(`page-${page}`).classList.add("active");
  document.getElementById("siteHeader").style.display=page==="admin"?"none":"block";
  window.scrollTo(0,0);
  renderPage(page);
  renderUserNav();
}
function handleSearch(q){
  state.searchQuery=q;
  if(q.trim()){state.activeCategory=null;navigate("shop");}
}
function renderPage(p){
  const map={home:renderHome,shop:renderShop,cart:renderCart,checkout:renderCheckout,login:renderLogin,wishlist:renderWishlist,account:renderAccount,orders:renderAccount,admin:renderAdmin};
  map[p]?.();
}

// ─── SHOP ───
function renderShop(){
  let list=[...state.products];
  const q=state.searchQuery.toLowerCase().trim();
  if(q)list=list.filter(p=>p.name.toLowerCase().includes(q)||p.description.toLowerCase().includes(q)||p.category.toLowerCase().includes(q));
  else if(state.activeCategory==="new-arrivals")list=list.filter(p=>p.badge==="new-arrivals");
  else if(state.activeCategory==="sale")list=list.filter(p=>p.badge==="sale");
  else if(state.activeCategory)list=list.filter(p=>p.category===state.activeCategory);
  list=list.filter(p=>(p.salePrice||p.price)>=state.shopFilters.minPrice&&(p.salePrice||p.price)<=state.shopFilters.maxPrice);
  if(state.shopFilters.subcategory)list=list.filter(p=>p.subcategory===state.shopFilters.subcategory);
  if(state.shopSort==="price-asc")list.sort((a,b)=>(a.salePrice||a.price)-(b.salePrice||b.price));
  else if(state.shopSort==="price-desc")list.sort((a,b)=>(b.salePrice||b.price)-(a.salePrice||a.price));
  else if(state.shopSort==="rating")list.sort((a,b)=>b.rating-a.rating);
  const subs=state.activeCategory&&SUBCATEGORIES[state.activeCategory];
  const catLabel=q?`Search: "${state.searchQuery}"`:(CATEGORIES.find(c=>c.id===state.activeCategory)?.label||"All Products");
  const subFilter=subs?`<div class="filter-section">
    <div class="filter-label">Category</div>
    <button class="filter-btn${!state.shopFilters.subcategory?' active':''}" onclick="setSubcat(null)">All</button>
    ${subs.map(s=>`<button class="filter-btn${state.shopFilters.subcategory===s?' active':''}" onclick="setSubcat('${s}')">${s}</button>`).join("")}
  </div>`:"";
  document.getElementById("page-shop").innerHTML=`
  <div class="shop-layout">
    <aside>
      <div class="sidebar">
        <h3>🔧 Filters</h3>
        ${subFilter}
        <div class="filter-section">
          <div class="filter-label">Price Range (KSh)</div>
          <div class="price-inputs">
            <input class="price-inp" type="number" placeholder="Min" value="${state.shopFilters.minPrice}" onchange="setPriceFilter('min',this.value)"/>
            <input class="price-inp" type="number" placeholder="Max" value="${state.shopFilters.maxPrice}" onchange="setPriceFilter('max',this.value)"/>
          </div>
        </div>
        <div class="filter-section">
          <div class="filter-label">Badge</div>
          <button class="filter-btn" onclick="state.activeCategory='new-arrivals';renderShop()">✨ New Arrivals</button>
          <button class="filter-btn" onclick="state.activeCategory='sale';renderShop()">🏷️ Sale Items</button>
        </div>
        <button class="clear-btn" onclick="clearFilters()">✕ Clear Filters</button>
      </div>
    </aside>
    <div>
      <div class="shop-sort-row">
        <div>
          <h1 style="margin:0;font-size:26px;font-weight:900;color:#111827;font-family:'Sora',sans-serif;letter-spacing:-.5px">${catLabel}</h1>
          <p style="color:#9ca3af;margin:5px 0 0;font-size:14px;font-weight:600">${list.length} products found</p>
        </div>
        <select class="sort-select" onchange="setSort(this.value)">
          <option value="featured"${state.shopSort==="featured"?" selected":""}>Featured</option>
          <option value="newest"${state.shopSort==="newest"?" selected":""}>Newest First</option>
          <option value="price-asc"${state.shopSort==="price-asc"?" selected":""}>Price: Low to High</option>
          <option value="price-desc"${state.shopSort==="price-desc"?" selected":""}>Price: High to Low</option>
          <option value="rating"${state.shopSort==="rating"?" selected":""}>Best Rated</option>
        </select>
      </div>
      ${list.length===0?`<div class="empty-state"><div class="empty-icon">🏊</div><div class="empty-title">No products found</div><p style="margin-top:8px;color:var(--gray400)">Try adjusting your filters</p></div>`:`<div class="grid-3">${list.map(productCardHTML).join("")}</div>`}
    </div>
  </div>`;
}
function setSubcat(s){state.shopFilters.subcategory=s;renderShop();}

  else addToast("Invalid coupon code","error");
}

  if(state.user){coForm.name=coForm.name||state.user.name;coForm.email=coForm.email||state.user.email;}
  if(coStep===3){
    document.getElementById("page-checkout").innerHTML=`<div class="success-page"><div class="success-icon">🎉</div><h2 class="success-title">Order Placed!</h2><p class="success-sub">Thank you for shopping with AquaVibe. You'll receive a confirmation email shortly. Happy swimming!</p><button class="back-home-btn" onclick="coStep=1;navigate('home')">Back to Home</button></div>`;return;
  }
  const steps=`<div class="steps"><div class="step-circle${coStep>=1?' done':' pending'}">1</div><span class="step-label${coStep===1?' active':''}">Shipping</span><div class="step-line${coStep>1?' done':' pending'}"></div><div class="step-circle${coStep>=2?' done':' pending'}">2</div><span class="step-label${coStep===2?' active':''}">Payment</span><div class="step-line${coStep>2?' done':' pending'}"></div><div class="step-circle${coStep>=3?' done':' pending'}">3</div><span class="step-label${coStep===3?' active':''}">Confirm</span></div>`;
  const miniItems=state.cart.map(item=>`<div class="order-mini-item"><img class="order-mini-img" src="${item.image}" alt="${item.name}" onerror="this.src='https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=200&q=80'"/><div style="flex:1"><p style="margin:0;font-size:13px;font-weight:700">${item.name}</p><p style="margin:3px 0 0;font-size:12px;color:#9ca3af">x${item.qty} · ${item.size} · ${item.color}</p></div><span style="font-weight:800;font-size:14px">${fmt((item.salePrice||item.price)*item.qty)}</span></div>`).join("");
  const step1=`<div class="checkout-card"><h2>Shipping Information</h2><div class="form-grid2"><div class="form-group"><label class="form-label">Full Name</label><input class="form-inp" value="${coForm.name}" oninput="coForm.name=this.value" placeholder="Jane Doe"/></div><div class="form-group"><label class="form-label">Email</label><input class="form-inp" type="email" value="${coForm.email}" oninput="coForm.email=this.value" placeholder="jane@example.com"/></div></div><div class="form-group"><label class="form-label">Phone Number</label><input class="form-inp" type="tel" value="${coForm.phone}" oninput="coForm.phone=this.value" placeholder="+254 700 000 000"/></div><div class="form-group"><label class="form-label">Street Address</label><input class="form-inp" value="${coForm.address}" oninput="coForm.address=this.value" placeholder="123 Mombasa Road"/></div><div class="form-grid2"><div class="form-group"><label class="form-label">City</label><input class="form-inp" value="${coForm.city}" oninput="coForm.city=this.value" placeholder="Nairobi"/></div><div class="form-group"><label class="form-label">County</label><input class="form-inp" value="${coForm.county}" oninput="coForm.county=this.value" placeholder="Nairobi County"/></div></div><button onclick="coStep=2;renderCheckout()" style="width:100%;padding:14px;background:linear-gradient(135deg,#0ea5e9,#0284c7);color:#fff;border:none;border-radius:12px;font-weight:800;font-size:16px;cursor:pointer;font-family:'DM Sans',sans-serif;box-shadow:0 4px 16px rgba(14,165,233,.3)">Continue to Payment →</button></div>`;
  const payOptions=[["mpesa","📱 M-Pesa"],["airtel","🏧 Airtel Money"],["card","💳 Credit / Debit Card"],["cash","💵 Cash on Delivery"]];
  const step2=`<div class="checkout-card"><h2>Payment Method</h2>${payOptions.map(([v,l])=>`<div class="pay-option${coForm.method===v?' selected':''}" onclick="coForm.method='${v}';renderCheckout()"><input type="radio" ${coForm.method===v?"checked":""}><label>${l}</label></div>`).join("")}${coForm.method==="mpesa"?`<div class="mpesa-note">📱 You'll receive an M-Pesa STK push on your phone to complete payment of <strong>${fmt(subtotal+shipping)}</strong>. Ensure your phone is on and unlocked.</div>`:""}<div style="display:flex;gap:14px;margin-top:8px"><button class="btn-back" onclick="coStep=1;renderCheckout()">← Back</button><button class="btn-place" onclick="placeOrder()">Place Order 🎉</button></div></div>`;
  document.getElementById("page-checkout").innerHTML=`<div class="checkout-layout"><div>${steps}${coStep===1?step1:step2}</div><div class="order-summary-mini"><h3 style="margin:0 0 18px;font-weight:800;font-size:17px">Your Order</h3>${miniItems}<div style="margin-top:4px"><div style="display:flex;justify-content:space-between;margin-bottom:10px;font-size:14px"><span>Subtotal</span><span style="font-weight:700">${fmt(subtotal)}</span></div><div style="display:flex;justify-content:space-between;margin-bottom:10px;font-size:14px"><span>Shipping</span><span style="font-weight:700">${shipping===0?'<span style="color:#10b981">FREE</span>':fmt(shipping)}</span></div><hr style="border:none;border-top:1.5px solid var(--gray100);margin:12px 0"/><div style="display:flex;justify-content:space-between;font-size:20px;font-weight:900;color:#0284c7"><span>Total</span><span>${fmt(subtotal+shipping)}</span></div></div></div></div>`;
}
function placeOrder(){
  const subtotal=state.cart.reduce((a,b)=>a+(b.salePrice||b.price)*b.qty,0);const shipping=subtotal>=5000?0:350;
  state.orders.push({id:`ORD-${Date.now()}`,user:coForm.email||state.user?.email||"guest",date:new Date().toISOString().split("T")[0],items:state.cart.map(i=>({productId:i.id,qty:i.qty,size:i.size,color:i.color})),total:subtotal+shipping,status:"processing",shipping:{name:coForm.name,address:`${coForm.address}, ${coForm.city}, ${coForm.county}`,phone:coForm.phone}});
  state.cart=[];state.cartDiscount=0;state.couponApplied=false;coStep=3;addToast("Order placed successfully! 🎉","success");updateBadges();renderCheckout();
}

let loginMode="login";let loginForm={name:"",email:"",password:""};
function renderLogin(){
  document.getElementById("page-login").innerHTML=`
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-icon">🌊</div>
      <div class="login-title">Welcome to AquaVibe</div>
      <div class="login-sub">${loginMode==="login"?"Sign in to your account to continue":"Create your account — it's free!"}</div>
      <div class="tab-switch">
        <button class="tab-sw-btn${loginMode==='login'?' active':''}" onclick="setLoginMode('login')">Sign In</button>
        <button class="tab-sw-btn${loginMode==='signup'?' active':''}" onclick="setLoginMode('signup')">Sign Up</button>
      </div>
      ${loginMode==="signup"?`<div class="form-group"><label class="form-label">Full Name</label><input class="form-inp" value="${loginForm.name}" oninput="loginForm.name=this.value" placeholder="Jane Doe"/></div>`:""}
      <div class="form-group"><label class="form-label">Email Address</label><input class="form-inp" type="email" value="${loginForm.email}" oninput="loginForm.email=this.value" placeholder="you@example.com"/></div>
      <div class="form-group"><label class="form-label">Password</label><input class="form-inp" type="password" value="${loginForm.password}" oninput="loginForm.password=this.value" placeholder="••••••••" onkeydown="if(event.key==='Enter')submitLogin()"/></div>
      <button class="login-btn" onclick="submitLogin()">${loginMode==="login"?"Sign In →":"Create Account →"}</button>
      ${loginMode==="login"?`<div class="demo-box"><strong>🔑 Demo Accounts</strong><br/>👤 User: jane@example.com / pass123<br/>⚙️ Admin: admin@aquavibe.co.ke / admin123</div>`:""}
    </div>
  </div>`;
}
function setLoginMode(m){loginMode=m;renderLogin();}
function submitLogin(){
  if(loginMode==="login"){
    const found=USERS.find(u=>u.email===loginForm.email&&u.password===loginForm.password);
    if(found){state.user=found;addToast(`Welcome back, ${found.name}! 👋`,"success");renderUserNav();navigate(state.pendingPage||"home");state.pendingPage=null;}
    else addToast("Invalid email or password","error");
  } else {
    if(!loginForm.name||!loginForm.email||!loginForm.password){addToast("Please fill all fields","error");return;}
    state.user={email:loginForm.email,name:loginForm.name,role:"user"};addToast("Account created! Welcome! 🎉","success");renderUserNav();navigate("home");
  }
}

      <tbody>${state.orders.map(o=>`
      <tr>
        <td style="font-weight:800;color:#0284c7">${o.id}</td>
        <td><div><p style="margin:0;font-weight:700;font-size:13px">${o.shipping?.name||"Guest"}</p><p style="margin:0;font-size:12px;color:#9ca3af">${o.user}</p></div></td>
        <td style="color:#9ca3af;font-size:13px">${o.date}</td>
        <td style="font-weight:600">${o.items.reduce((a,b)=>a+b.qty,0)}</td>
        <td style="font-weight:800;color:#111827">${fmt(o.total)}</td>
        <td><span class="status-pill" style="background:${statusColor[o.status]}18;color:${statusColor[o.status]}">${o.status}</span></td>
        <td><select class="order-status-select" style="border-color:${statusColor[o.status]};color:${statusColor[o.status]};background:${statusColor[o.status]}12" onchange="updateOrderStatus('${o.id}',this.value)">${["processing","shipped","delivered","cancelled"].map(s=>`<option value="${s}"${o.status===s?" selected":""}>${s}</option>`).join("")}</select></td>
      </tr>`).join("")}
      </tbody>
    </table>
  </div>`;

  // ── CATEGORIES ──
  const catsContent=`
  <div class="admin-title">Category Management</div>
  <div class="cat-cards" style="margin-bottom:32px">
    ${CATEGORIES.map(cat=>{
      const cnt=state.products.filter(p=>p.category===cat.id||(cat.id==="new-arrivals"&&p.badge==="new-arrivals")||(cat.id==="sale"&&p.badge==="sale")).length;
      return `<div class="cat-card"><span class="cat-card-icon">${cat.icon}</span><div><p style="margin:0;font-weight:800;font-size:15px">${cat.label}</p><p style="margin:4px 0 0;font-size:13px;color:#9ca3af">${cnt} products</p></div><span style="margin-left:auto;background:#f0f9ff;color:#0284c7;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:800">${cnt}</span></div>`;
    }).join("")}
  </div>
  <div style="background:#fff;border-radius:16px;padding:24px;box-shadow:0 2px 16px rgba(0,0,0,.06);border:1px solid var(--gray100)">
    <h3 style="margin:0 0 18px;font-weight:800;font-size:17px">Subcategories</h3>
    ${Object.entries(SUBCATEGORIES).map(([cat,subs])=>`
    <div style="margin-bottom:18px">
      <p style="font-weight:800;color:#0284c7;text-transform:capitalize;margin-bottom:10px;font-size:14px">📂 ${cat}</p>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        ${subs.map(s=>`<span style="background:#f0f9ff;color:#0284c7;padding:7px 16px;border-radius:20px;font-size:13px;font-weight:700;border:1px solid #bae6fd">${s}</span>`).join("")}
      </div>
    </div>`).join("")}
  </div>`;

  const contentMap={dashboard:dashContent,products:productsContent,orders:ordersContent,categories:catsContent};
  document.getElementById("page-admin").innerHTML=`
  <div class="admin-wrap">
    <div class="admin-sidebar">
      <div class="admin-sidebar-head">
        <div class="admin-logo">
          <div class="admin-logo-icon">🌊</div>
          <div><div class="admin-logo-text">AquaVibe</div><div class="admin-logo-sub">Admin Panel</div></div>
        </div>
      </div>
      <div style="padding:20px 0">
        <div class="admin-nav-section">Management</div>
        ${tabs.map(([t,ic,l])=>`<button class="admin-tab${state.adminTab===t?' active':''}" onclick="state.adminTab='${t}';renderAdmin()"><span class="admin-tab-icon">${ic}</span>${l}</button>`).join("")}
        <div class="admin-nav-section" style="margin-top:16px">Account</div>
        <button class="admin-tab" onclick="navigate('home')" style="margin-top:4px"><span class="admin-tab-icon">🏠</span>Back to Store</button>
        <button class="admin-tab danger" onclick="signOut()" style="color:#ef4444"><span class="admin-tab-icon">🚪</span>Sign Out</button>
      </div>
    </div>
    <div class="admin-content">${contentMap[state.adminTab]||dashContent}</div>
  </div>`;
}

function resetAdminForm(){
  adminForm={name:"",price:"",salePrice:"",category:"bikinis",subcategory:"",sizes:"XS,S,M,L,XL",colors:"Black,White",stock:10,description:"",material:"",badge:"",images:["https://images.unsplash.com/photo-1570976447640-ac859083963f?w=700&q=85"],featured:false};
  newImgUrl="";
}
function addProductImg(){
  const url=newImgUrl.trim()||document.getElementById("addImgUrl")?.value.trim();
  if(!url)return;
  if(!url.startsWith("http")){addToast("Please enter a valid URL starting with http","error");return;}
  if(!adminForm.images)adminForm.images=[];
  adminForm.images.push(url);
  newImgUrl="";
  renderAdmin();
  addToast("Image added ✓","success");
}
function removeProductImg(idx){
  adminForm.images.splice(idx,1);
  if(!adminForm.images.length)adminForm.images=["https://images.unsplash.com/photo-1570976447640-ac859083963f?w=700&q=85"];
  renderAdmin();
}
function editProduct(id){
  const p=state.products.find(x=>x.id===id);
  if(!p)return;
  editProductId=id;
  adminForm={...p,sizes:Array.isArray(p.sizes)?p.sizes.join(","):p.sizes,colors:Array.isArray(p.colors)?p.colors.join(","):p.colors,salePrice:p.salePrice||"",images:p.images?.length?[...p.images]:[p.image||"https://images.unsplash.com/photo-1570976447640-ac859083963f?w=700&q=85"]};
  showProductForm=true;
  state.adminTab="products";
  renderAdmin();
  setTimeout(()=>window.scrollTo({top:0,behavior:'smooth'}),100);
}
function deleteProduct(id){
  if(!confirm("Delete this product? This cannot be undone."))return;
  state.products=state.products.filter(p=>p.id!==id);
  addToast("Product deleted","info");
  renderAdmin();
}
function saveProduct(){
  if(!adminForm.name||!adminForm.price){addToast("Name and price are required","error");return;}
  const imgs=(adminForm.images||[]).filter(Boolean);
  const primaryImg=imgs[0]||"https://images.unsplash.com/photo-1570976447640-ac859083963f?w=700&q=85";
  const p={
    ...adminForm,
    id:editProductId||Date.now(),
    price:Number(adminForm.price),
    salePrice:adminForm.salePrice?Number(adminForm.salePrice):null,
    sizes:typeof adminForm.sizes==="string"?adminForm.sizes.split(",").map(s=>s.trim()).filter(Boolean):adminForm.sizes,
    colors:typeof adminForm.colors==="string"?adminForm.colors.split(",").map(c=>c.trim()).filter(Boolean):adminForm.colors,
    stock:Number(adminForm.stock),
    image:primaryImg,
    images:imgs,
    rating:editProductId?state.products.find(x=>x.id===editProductId)?.rating||4.5:4.5,
    reviews:editProductId?state.products.find(x=>x.id===editProductId)?.reviews||0:0,
  };
  if(editProductId)state.products=state.products.map(pp=>pp.id===editProductId?p:pp);
  else state.products.unshift(p);
  showProductForm=false;editProductId=null;
  addToast(editProductId?"Product updated ✓":"Product added ✓","success");
  renderAdmin();
}
function updateOrderStatus(orderId,status){
  const idx=state.orders.findIndex(o=>o.id===orderId);
  if(idx>-1){state.orders[idx].status=status;addToast(`Order ${orderId} → ${status}`,"success");}
}

// ─── INIT ───
renderCatNav();
renderUserNav();
renderHome();
updateBadges();
</script>
</body>
</html>
